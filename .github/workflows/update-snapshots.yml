name: update-snapshots
# Manually regenerate Playwright visual baselines on the CI runner so they
# match the exact environment (fonts, rendering) used by the regression job.
# Run via: gh workflow run update-snapshots.yml --ref <branch>
# Then download the `visual-snapshots` artifact and commit it.
on: { workflow_dispatch: {} }
permissions: { contents: read }
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps
      - run: npx playwright test --update-snapshots
      - uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: tests/e2e/visual.spec.ts-snapshots/
          retention-days: 7
